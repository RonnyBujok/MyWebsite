  <script>
    function getTodayKey() {
      return new Date().toISOString().split("T")[0];
    }

    async function loadFact(forceNew = false) {
      const today = getTodayKey();
      const saved = localStorage.getItem("fact-" + today);
      if (saved && !forceNew) {
        document.getElementById("fact").innerHTML = saved;
        return;
      }

      try {
        const res = await fetch("https://uselessfacts.jsph.pl/random.json?language=en");
        const data = await res.json();

        const html = `<p>${data.text}</p>`;
        localStorage.setItem("fact-" + today, html);
        document.getElementById("fact").innerHTML = html;
      } catch (err) {
        document.getElementById("fact").innerHTML = "Failed to load fact 😢";
      }
    }

    loadFact();

        sidebar.style.display = 'flex'

    function hideSidebar(){
        const sidebar = document.querySelector('.sidebar')
        sidebar.style.display = 'none'
      }

  <div class="search-bar">

  <div class="recipe-flex">
    <div class="recipe-names">

        <input type="text" class="search-input" placeholder="Search...">
        <button id="search-btn"><img src="icons/search.svg" alt=""></button>
      </div>
      <div class="title-container">
        <h2>All Recipes:</h2>
        <ul id="recipe-list"></ul>
      </div>
      <div class="recipe-tags-container">
        <h2>All Tags:</h2>

    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // -------------------- Global Variables --------------------
  let allRecipes = [];
  let selectedTags = [];
  const SUPABASE_URL = "https://oqzceuesqnkmdbsgttcl.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_gQkpZldPR96EZ2JHwSan5Q_rmjX2WMN";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const recipesBtn = document.getElementById('recipes-btn');
  const tagsBtn = document.getElementById('tags-btn');
  const recipeDd = document.getElementById('recipe-dd');
  const tagsDd = document.getElementById('tags-dd');

  // -------------------- Load Recipes from Supabase --------------------
  async function loadRecipes() {
    const recipePage = document.querySelector('.recipe-page');
    recipePage.innerHTML = "<p>Loading recipes from Supabase...</p>";

    try {
      const { data: recipes, error } = await supabaseClient
        .from("recipes")
        .select("*")
        .order("id");

      if (error) throw error;
      if (!recipes || recipes.length === 0) {
        recipePage.innerHTML = "<p>No recipes found in Supabase yet.</p>";
        return;
      }

      // Parse JSON fields safely
      allRecipes = recipes.map(r => ({
        name: r.name || "Unnamed",
        baseServings: r.baseServings || 4,
        image: r.image || "",
        tags: typeof r.tags === 'string' ? JSON.parse(r.tags) : (r.tags || []),
        ingredients: typeof r.ingredients === 'string' ? JSON.parse(r.ingredients) : (r.ingredients || []),
        instructions: typeof r.instructions === 'string' ? JSON.parse(r.instructions) : (r.instructions || []),
        credits: typeof r.credits === 'string' ? JSON.parse(r.credits) : (r.credits || { author: "", link: "" })
      }));

      // Sort alphabetically
      allRecipes.sort((a, b) => a.name.localeCompare(b.name));

      displayRecipeNames(allRecipes);
      displayRecipes(allRecipes);

      // Attach search listeners
      document.querySelectorAll('.search-input').forEach(input => {
        input.addEventListener('input', e => {
          selectedTags = [];
          document.querySelectorAll('.recipe-tag').forEach(t => {
            t.classList.remove('active');
            t.style.backgroundColor = '';
            t.style.color = '';
          });
          filterRecipesBySearchTerm(input.value.trim().toLowerCase());
        });
      });

    } catch (err) {
      console.error("Failed to load recipes:", err);
      recipePage.innerHTML = `<p style="color:red;">Error fetching recipes: ${err.message}</p>`;
    }
  }
function displayRecipeNames(recipes) {
  const recipeList = document.getElementById('recipe-list');
  const recipeDd = document.getElementById('recipe-dd');
  const tagsContainer = document.querySelector('.tags-container');
  const tagsDdChild = document.getElementById('tags-dd-child');

  recipeList.innerHTML = '';
  recipeDd.innerHTML = '';
  tagsContainer.innerHTML = '';
  tagsDdChild.innerHTML = '';

  let allTags = [];

  // ---------- CREATE RECIPE LIST ----------
  recipes.forEach(recipe => {
    const li = document.createElement('li');
    const a = document.createElement('a');

    a.href = `#${recipe.name.replace(/\s+/g,'-').toLowerCase()}`;
    a.textContent = recipe.name;

    // ✅ RESET FILTERS WHEN CLICKING RECIPE
    a.addEventListener('click', () => {
      selectedTags = [];

      document.querySelectorAll('.recipe-tag').forEach(tag => {
        tag.classList.remove('active');
        tag.style.backgroundColor = '';
        tag.style.color = '';
      });

      document.querySelectorAll('.search-input').forEach(input => input.value = '');

      displayRecipes(allRecipes);

      // optional UI reset
      recipeDd.style.display = 'none';
      tagsDd.style.display = 'none';
      recipesBtn.style.backgroundColor = '';
      recipesBtn.style.color = '';
      tagsBtn.style.backgroundColor = '';
      tagsBtn.style.color = '';
    });

    li.appendChild(a);
    recipeList.appendChild(li);

    // ⚠️ cloneNode does NOT copy event listeners → re-add click
    const liClone = li.cloneNode(true);
    const cloneLink = liClone.querySelector('a');

    cloneLink.addEventListener('click', () => {
      selectedTags = [];

      document.querySelectorAll('.recipe-tag').forEach(tag => {
        tag.classList.remove('active');
        tag.style.backgroundColor = '';
        tag.style.color = '';
      });

      document.querySelectorAll('.search-input').forEach(input => input.value = '');

      displayRecipes(allRecipes);

      recipeDd.style.display = 'none';
      tagsDd.style.display = 'none';
      recipesBtn.style.backgroundColor = '';
      recipesBtn.style.color = '';
      tagsBtn.style.backgroundColor = '';
      tagsBtn.style.color = '';
    });

    recipeDd.appendChild(liClone);

    // collect tags
    recipe.tags.forEach(t => {
      if (!allTags.includes(t)) allTags.push(t);
    });
  });

  // ---------- TAG CREATOR ----------
  function createTagElement(tag) {
    const span = document.createElement('span');
    span.classList.add('recipe-tag');
    span.textContent = tag;

    span.addEventListener('click', () => {
      document.querySelectorAll('.search-input').forEach(input => input.value = '');

      span.classList.toggle('active');

      if (span.classList.contains('active')) {
        span.style.backgroundColor = "#DDA15E";
        span.style.color = "white";

        if (!selectedTags.includes(tag.toLowerCase())) {
          selectedTags.push(tag.toLowerCase());
        }
      } else {
        span.style.backgroundColor = "";
        span.style.color = "";

        selectedTags = selectedTags.filter(t => t !== tag.toLowerCase());
      }

      filterRecipesBySelectedTags();
    });

    return span;
  }

  // ---------- CREATE TAGS ----------
  allTags.sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));

  allTags.forEach(tag => {
    tagsContainer.appendChild(createTagElement(tag));
    tagsDdChild.appendChild(createTagElement(tag));
  });

  // ---------- APPLY BUTTON ----------
  const applyBtn = document.querySelector('.apply');
  applyBtn.replaceWith(applyBtn.cloneNode(true)); // prevent duplicate listeners

  document.querySelector('.apply').addEventListener('click', () => {
    filterRecipesBySelectedTags();

    tagsDd.style.display = 'none';
    tagsBtn.style.backgroundColor = '';
    tagsBtn.style.color = '';
  });

  // ---------- RESET BUTTON ----------
  const resetBtn = document.querySelector('.reset-tag');
  resetBtn.replaceWith(resetBtn.cloneNode(true)); // prevent duplicate listeners

  document.querySelector('.reset-tag').addEventListener('click', () => {
    selectedTags = [];

    document.querySelectorAll('.recipe-tag').forEach(t => {
      t.classList.remove('active');
      t.style.backgroundColor = '';
      t.style.color = '';
    });

    displayRecipes(allRecipes);
  });
}

  function displayRecipes(recipes) {
    const page = document.querySelector('.recipe-page');
    page.innerHTML = '';
    if (recipes.length === 0) {
      page.innerHTML = `<p style="text-align:center;margin-top:2rem;">No recipes found.</p>`;
      return;
    }

    recipes.forEach(recipe => {
      const entry = document.createElement('div');
      entry.className = 'entry';
      entry.id = recipe.name.replace(/\s+/g, '-').toLowerCase();

      const h1 = document.createElement('h1'); h1.textContent = recipe.name; entry.appendChild(h1);

      const left = document.createElement('div'); left.className='container-left';
      const imgDiv = document.createElement('div'); imgDiv.className='image';
      if(recipe.image) { const img = document.createElement('img'); img.src=recipe.image; img.alt=recipe.name; imgDiv.appendChild(img); }
      left.appendChild(imgDiv);

      const ingDiv = document.createElement('div'); ingDiv.className='ingredients';
      const ingTitle = document.createElement('p'); ingTitle.className='ingredients-title'; ingTitle.textContent='Ingredients';
      ingDiv.appendChild(ingTitle);

      const servingsDiv = document.createElement('div'); servingsDiv.className='serving';
      const servingsLabel = document.createElement('p'); servingsLabel.textContent='Servings:';
      const servingsSelect = document.createElement('select');
      for(let i=1;i<=8;i++){ const opt=document.createElement('option'); opt.value=i; opt.textContent=i; servingsSelect.appendChild(opt);}
      servingsSelect.value = recipe.baseServings;
      servingsDiv.appendChild(servingsLabel); servingsDiv.appendChild(servingsSelect); ingDiv.appendChild(servingsDiv);

      const ul = document.createElement('ul'); 
      ul.className = 'ingredients-list';

      recipe.ingredients.forEach(ing => {
        const li = document.createElement('li');
        li.setAttribute('data-base', ing.amount);
        li.dataset.name = ing.name;   // store name
        li.dataset.unit = ing.unit;   // store unit

        // Display initially
        li.textContent = ing.amount > 0 
            ? `${ing.amount} ${ing.unit} ${ing.name}`.trim() 
            : ing.name;

        ul.appendChild(li);
      });

      ingDiv.appendChild(ul); left.appendChild(ingDiv);

      const right = document.createElement('div'); right.className='description';
      const instTitle = document.createElement('p'); instTitle.className = 'instructions-title'; instTitle.textContent='Instructions';
      const ol = document.createElement('ol');
      recipe.instructions.forEach(step=>{ const li=document.createElement('li'); li.textContent=step; ol.appendChild(li);});
      right.appendChild(instTitle); right.appendChild(ol);

      const credit = document.createElement('div'); credit.className='credit';
      const creditP = document.createElement('p'); creditP.textContent='Credits:'; credit.appendChild(creditP);
      if(recipe.credits.link){ const a=document.createElement('a'); a.href=recipe.credits.link; a.target='_blank'; a.textContent=recipe.credits.author; credit.appendChild(a);}
      else { const span=document.createElement('span'); span.textContent=recipe.credits.author; credit.appendChild(span);}

      const container = document.createElement('div'); container.className='recipe-container';
      container.appendChild(left); container.appendChild(right);

      entry.appendChild(container); entry.appendChild(credit); page.appendChild(entry);

      servingsSelect.addEventListener('change', e=>updateIngredients(e.target, recipe.baseServings));
      updateIngredients(servingsSelect, recipe.baseServings);
    });
  }

  function updateIngredients(select, baseServings){
    const entry = select.closest('.entry');
    const ulList = entry.querySelectorAll('.ingredients-list li');
    const servings = parseInt(select.value);

    ulList.forEach(li => {
      const baseAmount = parseFloat(li.getAttribute('data-base'));
      const updatedAmount = parseFloat((baseAmount * (servings / baseServings)).toFixed(2));

      // Get ingredient name and unit from li.dataset
      const name = li.dataset.name || li.textContent.trim();
      const unit = li.dataset.unit || '';

      // Display ingredient
      li.textContent = updatedAmount > 0
        ? `${updatedAmount} ${unit} ${name}`.trim()
        : name;
    });
  }

  function filterRecipesBySelectedTags(){
    if(selectedTags.length===0) displayRecipes(allRecipes);
    else {
      const filtered = allRecipes.filter(r=>selectedTags.every(t=>r.tags.map(tt=>tt.toLowerCase()).includes(t)));
      displayRecipes(filtered);
    }
  }

  function filterRecipesBySearchTerm(term){
    if(term==='') displayRecipes(allRecipes);
    else {
      const filtered = allRecipes.filter(r=>{
        return r.name.toLowerCase().includes(term) || r.tags.some(t=>t.toLowerCase().includes(term));
      });
      displayRecipes(filtered);
    }
  }

  // -------------------- Initialize --------------------
// -------------------- Initialize --------------------
window.addEventListener('load', () => {
  loadRecipes();

  // ---------- Recipes dropdown ----------
  recipesBtn.addEventListener('click', () => {
    if (recipeDd.style.display === 'none' || recipeDd.style.display === '') {
      recipeDd.style.display = 'flex';
      recipesBtn.style.backgroundColor = "#DDA15E";
      recipesBtn.style.color = "white";

      tagsDd.style.display = 'none';
      tagsBtn.style.backgroundColor = '';
      tagsBtn.style.color = '';

      document.querySelectorAll('.search-input').forEach(input => input.value = '');
      filterRecipesBySearchTerm('');
    } else {
      recipeDd.style.display = 'none';
      recipesBtn.style.backgroundColor = '';
      recipesBtn.style.color = '';
    }
  });

  // ---------- Tags dropdown ----------
  tagsBtn.addEventListener('click', () => {
    if (tagsDd.style.display === 'none' || tagsDd.style.display === '') {
      tagsDd.style.display = 'flex';
      tagsBtn.style.backgroundColor = "#DDA15E";
      tagsBtn.style.color = "white";

      recipeDd.style.display = 'none';
      recipesBtn.style.backgroundColor = '';
      recipesBtn.style.color = '';

      // Reset search if no tags selected
      if (selectedTags.length === 0) {
        document.querySelectorAll('.search-input').forEach(input => input.value = '');
        displayRecipes(allRecipes);
      }
    } else {
      tagsDd.style.display = 'none';
      tagsBtn.style.backgroundColor = '';
      tagsBtn.style.color = '';
    }
  });

  // ---------- Search button logic ----------
  const searchButtons = document.querySelectorAll('#search-btn');

  searchButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const input = btn.parentElement.querySelector('.search-input');
      const value = input.value.trim().toLowerCase();

      // Always reset tags when searching
      selectedTags = [];
      document.querySelectorAll('.recipe-tag').forEach(tag => {
        tag.classList.remove('active');
        tag.style.backgroundColor = '';
        tag.style.color = '';
      });

      if (value === '') {
        // Empty search → show all recipes
        displayRecipes(allRecipes);
      } else {
        filterRecipesBySearchTerm(value);
      }

      // Optional UI reset
      recipeDd.style.display = 'none';
      tagsDd.style.display = 'none';
      recipesBtn.style.backgroundColor = '';
      recipesBtn.style.color = '';
      tagsBtn.style.backgroundColor = '';
      tagsBtn.style.color = '';
    });
  });

  // ---------- Optional: trigger search on Enter ----------
  document.querySelectorAll('.search-input').forEach(input => {
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const btn = input.parentElement.querySelector('#search-btn');
        btn.click();
      }
    });
  });
});


</script>

name: Keep Supabase Alive

on:
  schedule:
    # Dit maakt het RECURRING (automatisch herhalend)
    # Dit cron-schema draait elke dinsdag en vrijdag om 00:00 UTC
    - cron: '0 0 * * 2,5'
  workflow_dispatch: # Zorgt dat je handmatig op de knop kunt drukken

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send Ping Request
        run: |
          curl -i -sS -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/recipes?limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"

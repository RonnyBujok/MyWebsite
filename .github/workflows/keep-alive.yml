name: Keep Supabase Alive

on:
  schedule:
    # Runs every 2 days at midnight UTC
    - cron: '0 0 */2 * *'

  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest

    steps:
      - name: Ping recipes table
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          "${{ secrets.SUPABASE_URL }}/rest/v1/recipes?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "Supabase status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "Supabase ping failed"
            exit 1
          fi
